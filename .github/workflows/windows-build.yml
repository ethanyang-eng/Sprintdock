name: Build Sprint Dock for Windows

on:
  workflow_dispatch:
  push:
    paths:
      - "windows/**"
      - ".github/workflows/windows-build.yml"

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run planner and persistence checks
        run: dotnet run --project windows/SprintDock.Windows.Checks/SprintDock.Windows.Checks.csproj --configuration Release

      - name: Publish self-contained Windows app
        run: >-
          dotnet publish windows/SprintDock.Windows/SprintDock.Windows.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          --output artifacts/publish

      - name: Smoke launch Windows app
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Drawing
          Add-Type @"
          using System;
          using System.Runtime.InteropServices;

          public struct WindowRect {
            public int Left;
            public int Top;
            public int Right;
            public int Bottom;
          }

          public static class WindowCapture {
            [DllImport("user32.dll")]
            public static extern bool GetWindowRect(IntPtr hWnd, out WindowRect rect);

            [DllImport("user32.dll")]
            public static extern bool SetForegroundWindow(IntPtr hWnd);

            [DllImport("user32.dll")]
            public static extern bool ShowWindow(IntPtr hWnd, int command);
          }
          "@

          $process = Start-Process "artifacts/publish/SprintDock.exe" -PassThru
          try {
            $null = $process.WaitForInputIdle(10000)
            for ($attempt = 0; $attempt -lt 20; $attempt++) {
              $process.Refresh()
              if ($process.MainWindowHandle -ne [IntPtr]::Zero) { break }
              Start-Sleep -Milliseconds 250
            }

            if ($process.HasExited) {
              throw "SprintDock.exe exited during startup with code $($process.ExitCode)."
            }
            if ($process.MainWindowHandle -eq [IntPtr]::Zero) {
              throw "SprintDock.exe started without creating a visible window."
            }

            $null = [WindowCapture]::ShowWindow($process.MainWindowHandle, 9)
            $null = [WindowCapture]::SetForegroundWindow($process.MainWindowHandle)
            Start-Sleep -Seconds 2

            $rect = New-Object WindowRect
            if (-not [WindowCapture]::GetWindowRect($process.MainWindowHandle, [ref]$rect)) {
              throw "Could not read the Sprint Dock window bounds."
            }

            $width = $rect.Right - $rect.Left
            $height = $rect.Bottom - $rect.Top
            if ($width -lt 500 -or $height -lt 400) {
              throw "Sprint Dock opened at an unexpected size: ${width}x${height}."
            }

            $bitmap = New-Object System.Drawing.Bitmap($width, $height)
            $graphics = [System.Drawing.Graphics]::FromImage($bitmap)
            try {
              $graphics.CopyFromScreen($rect.Left, $rect.Top, 0, 0, $bitmap.Size)
              $bitmap.Save("$PWD/artifacts/SprintDock-Windows.png", [System.Drawing.Imaging.ImageFormat]::Png)
            }
            finally {
              $graphics.Dispose()
              $bitmap.Dispose()
            }

            Write-Host "SprintDock.exe started successfully and its window was captured."
          }
          finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Verify and package one app
        shell: pwsh
        run: |
          $exe = "artifacts/publish/SprintDock.exe"
          if (-not (Test-Path $exe)) { throw "SprintDock.exe was not produced." }
          New-Item -ItemType Directory -Force -Path artifacts/package | Out-Null
          Copy-Item $exe artifacts/package/SprintDock.exe
          $files = @(Get-ChildItem artifacts/package -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "SprintDock.exe") {
            throw "The Windows package must contain only SprintDock.exe."
          }
          Compress-Archive -Path artifacts/package/SprintDock.exe -DestinationPath artifacts/SprintDock-Windows.zip
          Write-Host "Packaged $([math]::Round((Get-Item $exe).Length / 1MB, 2)) MB single-file app."

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: SprintDock-Windows
          path: artifacts/SprintDock-Windows.zip
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows screenshot
        uses: actions/upload-artifact@v4
        with:
          name: SprintDock-Windows-Screenshot
          path: artifacts/SprintDock-Windows.png
          if-no-files-found: error
          retention-days: 30
